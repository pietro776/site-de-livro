<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BookShelf</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f0e9; /* Cor de papel envelhecido */
            --primary: #2c3e50;  /* Azul meia-noite (tinta) */
            --accent: #8b4513;   /* Marrom couro */
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--primary);
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05); /* Sombra rígida estilo editorial */
            border-left: 12px solid var(--accent); /* Simula a lombada de um livro */
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Formulário */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--accent);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(44, 62, 80, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: var(--accent);
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <header>
            <h1>Bem-vindo</h1>
            <p class="subtitle">Acesse sua biblioteca pessoal</p>
        </header>

        <form>
            <div class="form-group">
                <label for="email">E-MAIL OU CARTÃO</label>
                <input type="email" id="email" placeholder="leitor@exemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">SENHA</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">ABRIR ESTANTE</button>
        </form>

        <div class="footer-links">
            <p>Novo por aqui? <a href="#">Registre-se</a></p>
        </div>
    </div>

</body>
</html>
